name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --quiet --reporter json TurboBudget

      # ----- mobsfscan -----
      - name: Install mobsfscan
        run: pip3 install mobsfscan

      - name: Run mobsfscan
        run: mobsfscan . --json > mobsfscan-report.json

      # ----- Periphery -----
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery
        run: periphery scan --project TurboBudget.xcodeproj --scheme TurboBudget --format xcode

      # ----- SonarQube -----
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
      # - uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}