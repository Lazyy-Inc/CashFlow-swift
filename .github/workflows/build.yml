name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Configure git for private packages
        run: |
          git config --global url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Debug: Vérifier l'authentification
      - name: Debug - Show git config
        run: |
          git config --list | grep url
          echo "Git auth test completed"

      # Clear SPM cache si nécessaire
      - name: Clear SPM cache
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
        continue-on-error: true

      # Résolution des dépendances avec timeout et verbose
      - name: Resolve Swift Package dependencies
        run: |
          echo "Starting dependency resolution..."
          timeout 900 xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 5

      # SwiftLint
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --quiet --reporter json CashFlow

      # mobsfscan (in a virtualenv)
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true

      # Periphery
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery
        run: periphery scan --project CashFlow.xcodeproj --schemes CashFlow --targets CashFlow --format xcode

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
