name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Diagnostic: Vérifier les packages dans Package.swift
      - name: Debug - Show Package.swift dependencies
        run: |
          if [ -f "Package.swift" ]; then
            echo "=== Package.swift content ==="
            cat Package.swift
          fi
          
          # Chercher les dépendances dans le projet Xcode
          echo "=== Xcode project packages ==="
          find . -name "*.xcodeproj" -exec echo "Project: {}" \; -exec plutil -p "{}/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" 2>/dev/null \; || echo "No Package.resolved found"

      # Configuration Git plus précise
      - name: Configure git authentication
        run: |
          # Test d'accès sans auth d'abord
          echo "Testing public GitHub access..."
          git ls-remote https://github.com/apple/swift.git HEAD || echo "Public access failed"
          
          # Configure l'auth pour tes repos privés
          git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
          
          # Test d'accès privé
          echo "Testing private repo access..."
          git ls-remote https://github.com/theosementa/CoreModule.git HEAD || echo "Private access failed"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Clear tout le cache SPM
      - name: Clear all SPM caches
        run: |
          echo "Clearing SPM caches..."
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf .build
          
          # Clear aussi le cache git si il existe
          rm -rf ~/.gitconfig || true
          
          # Reconfigure git après le clear
          git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Résolution avec diagnostics détaillés
      - name: Resolve Swift Package dependencies
        run: |
          echo "Starting dependency resolution..."
          echo "Current directory: $(pwd)"
          echo "Xcode version: $(xcodebuild -version)"
          
          # Résolution avec verbose mais sans timeout shell
          xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8
        continue-on-error: false

      # Si la résolution échoue, essayer plan B
      - name: Fallback - Manual SPM resolution
        if: failure()
        run: |
          echo "Trying manual SPM resolution..."
          swift package resolve || echo "Swift package resolve failed"
        timeout-minutes: 5

      # SwiftLint
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --quiet --reporter json CashFlow

      # mobsfscan
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true

      # Periphery
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery
        run: periphery scan --project CashFlow.xcodeproj --schemes CashFlow --targets CashFlow --format xcode

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
