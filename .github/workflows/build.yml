name: Quality Phase

on:
  push:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Analysis
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git authentication globally
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -verbose
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: |
          brew install swiftlint xchtmlreport sonar-scanner
          gem install xcpretty slather

      - name: Run SwiftLint on entire project
        run: |
          swiftlint lint --quiet --reporter json > sonarqube-swiftlint.json
        continue-on-error: true

      - name: Run All Tests with Test Plan
        run: |
          echo "Running tests with TestPlan.xctestplan..."
          xcodebuild test \
            -project CashFlow.xcodeproj \
            -scheme CashFlow \
            -testPlan TestPlan \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -derivedDataPath ./DerivedData \
            -resultBundlePath TestResults.xcresult \
            2>&1 | xcpretty -r junit --output reports/junit.xml
        continue-on-error: true

      - name: Generate HTML Test Report
        run: |
          mkdir -p reports
          xchtmlreport -r TestResults.xcresult -o reports/html

      - name: Convert coverage to lcov
        run: |
          slather coverage \
            --input-format profdata \
            --scheme CashFlow \
            --output-directory reports/coverage \
            --html \
            --lcov \
            CashFlow.xcodeproj
        continue-on-error: true

      - name: mobsfscan
        run: |
          pip install mobsfscan
          mobsfscan . --sarif > mobsfscan-report.sarif

      - name: List generated reports
        run: |
          echo "=== Generated reports ==="
          ls -lh reports || true
          ls -lh *.json *.xml *.sarif 2>/dev/null || true

      - uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
