name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Analysis
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Configuration Git GLOBALE pour tous les outils
      - name: Configure git authentication globally
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
          echo "Testing private repo access..."
          git ls-remote https://github.com/theosementa/AlertKit.git HEAD || echo "Private access test failed"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Clear tous les caches possibles
      - name: Clear all caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/com.github.peripheryapp
          rm -rf .build
        continue-on-error: true

      # Résolution des dépendances
      - name: Resolve Swift Package dependencies
        run: |
          echo "Starting dependency resolution..."
          xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # SwiftLint sur tout le projet
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint on entire project
        run: |
          echo "Running SwiftLint on entire project..."
          swiftlint lint --quiet --reporter json .
        continue-on-error: true

      # mobsfscan
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true

      # Periphery avec fichier de configuration
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery with configuration file
        run: |
          echo "Running Periphery with periphery.yml configuration..."
          git config --list | grep url.https || echo "No Git URL rewrite found"
          
          # Lancer Periphery avec le fichier de config
          periphery scan --config periphery.yml
          
          # Afficher le résumé si un rapport JSON a été généré
          if [ -f "periphery-report.json" ]; then
            echo ""
            echo "📊 Periphery Analysis Summary:"
            echo "Total issues found: $(cat periphery-report.json | jq length 2>/dev/null || echo 'Unable to parse')"
          fi
        env:
          GIT_TERMINAL_PROMPT: 0
        continue-on-error: true

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
