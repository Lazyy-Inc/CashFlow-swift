name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Analysis
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      # Configuration Git GLOBALE pour tous les outils
      - name: Configure git authentication globally
        run: git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Résolution des dépendances
      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # SwiftLint sur tout le projet
      - name: Install and Run SwiftLint
        run: | 
          brew install swiftlint
          swiftlint lint --quiet --reporter json > sonarqube-swiftlint.json
        continue-on-error: true

      # Installation de xcpretty pour formater les résultats xcodebuild
      - name: Install xcpretty
        run: gem install xcpretty

      # Exécution des tests avec le Test Plan
      - name: Run All Tests with Test Plan
        run: |
          echo "Running tests with TestPlan.xctestplan..."
          
          # Désactiver l'output verbeux de xcodebuild
          set -o pipefail
          
          xcodebuild test \
            -project CashFlow.xcodeproj \
            -scheme CashFlow \
            -testPlan CashFlowTestPlan \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./TestResults.xcresult \
            -quiet \
            2>&1 | tee xcodebuild.log | xcpretty --simple --color
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          echo ""
          echo "=== Build exit code: $BUILD_EXIT_CODE ==="
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "⚠️  Build/Test failed with exit code $BUILD_EXIT_CODE"
            echo "Check xcodebuild.log for details"
            # Afficher les dernières lignes du log en cas d'erreur
            tail -50 xcodebuild.log
          else
            echo "✅ Tests completed successfully"
          fi
          
          echo ""
          echo "=== Checking TestResults.xcresult ==="
          if [ -d "TestResults.xcresult" ]; then
            echo "✅ TestResults.xcresult exists"
            ls -lh TestResults.xcresult
          else
            echo "❌ TestResults.xcresult not found"
          fi
          
          echo ""
          echo "=== Checking DerivedData for coverage files ==="
          COVERAGE_FILES=$(find DerivedData -name "*.xccovarchive" -o -name "*.profdata" 2>/dev/null)
          if [ -z "$COVERAGE_FILES" ]; then
            echo "❌ No coverage files found in DerivedData"
            echo "Searching in TestResults.xcresult..."
            if [ -d "TestResults.xcresult" ]; then
              find TestResults.xcresult -type f | head -20
            fi
          else
            echo "✅ Found coverage files:"
            echo "$COVERAGE_FILES"
          fi
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Conversion de la couverture de code au format SonarQube
      - name: Convert coverage to SonarQube format
        run: |
          echo "Converting Xcode coverage to SonarQube format..."
          
          # Recherche du fichier de couverture dans DerivedData
          COVERAGE_FILE=$(find DerivedData -name "*.xccovarchive" | head -n 1)
          
          if [ -z "$COVERAGE_FILE" ]; then
            echo "No coverage file found in DerivedData, checking xcresult..."
            # Essayer d'extraire depuis le xcresult
            if [ -d "TestResults.xcresult" ]; then
              xcrun xccov view --report --json TestResults.xcresult > coverage.json
            else
              echo "No coverage data found"
              exit 0
            fi
          else
            echo "Found coverage file: $COVERAGE_FILE"
            xcrun xccov view --report --json "$COVERAGE_FILE" > coverage.json
          fi
          
          # Conversion au format SonarQube generic coverage
          python3 << 'EOF'
          import json
          import xml.etree.ElementTree as ET
          import os
          
          # Vérifier que le fichier coverage.json existe
          if not os.path.exists('coverage.json'):
              print("No coverage.json file found")
              exit(0)
          
          with open('coverage.json', 'r') as f:
              data = json.load(f)
          
          root = ET.Element('coverage', version="1")
          
          for target in data.get('targets', []):
              for file_data in target.get('files', []):
                  file_path = file_data.get('path', '')
                  # Ignorer les fichiers de test et les dépendances
                  if not file_path or '/Tests/' in file_path or '/Test/' in file_path or '/Pods/' in file_path or '/.build/' in file_path:
                      continue
                  
                  file_elem = ET.SubElement(root, 'file', path=file_path)
                  
                  for func in file_data.get('functions', []):
                      for line_data in func.get('executableLines', []):
                          line_num = line_data.get('line', 0)
                          exec_count = line_data.get('executionCount', 0)
                          ET.SubElement(file_elem, 'lineToCover', 
                                      lineNumber=str(line_num),
                                      covered=str(exec_count > 0).lower())
          
          tree = ET.ElementTree(root)
          ET.indent(tree, space="  ")
          tree.write('sonarqube-coverage.xml', encoding='utf-8', xml_declaration=True)
          print("Coverage converted successfully to sonarqube-coverage.xml")
          EOF
        continue-on-error: true

      # Mobsfscan en SARIF
      - name: mobsfscan
        run: |
          pip install mobsfscan
          mobsfscan . --sarif > mobsfscan-report.sarif
          echo "Mobsfscan SARIF completed, checking output..."
          if [ -f "mobsfscan-report.sarif" ]; then
            echo "SARIF file created successfully"
            head -20 mobsfscan-report.sarif
          else
            echo "SARIF file not found!"
          fi

      # Debug: Vérifier les fichiers générés
      - name: List generated reports
        run: |
          echo "=== Generated reports ==="
          ls -lh *.json *.xml *.sarif 2>/dev/null || echo "No report files found"
          
          if [ -f "sonarqube-coverage.xml" ]; then
            echo "=== Coverage XML preview ==="
            head -30 sonarqube-coverage.xml
          fi

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X