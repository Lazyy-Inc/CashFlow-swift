name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # SwiftLint
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --quiet --reporter json TurboBudget

      # mobsfscan (in a virtualenv)
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true  # Mettre à false pour échouer si mobsfscan détecte des failles

      # Periphery
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery
        run: periphery scan --project CashFlow.xcodeproj --schemes CashFlow --targets CashFlow --format xcode

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
      # - uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
