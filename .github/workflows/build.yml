name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Analysis
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: true

      # Cache SwiftPM + DerivedData
      - uses: actions/cache@v3
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Git authentication global (repos privés)
      - name: Configure git authentication globally
        run: |
          git config --global url."https://${{ secrets.GH_TOKEN }}:@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
          git ls-remote https://github.com/theosementa/AlertKit.git HEAD || echo "Private access test failed"

      # Debug infos
      - name: Debug - Show Package.swift dependencies
        run: |
          if [ -f "Package.swift" ]; then
            echo "=== Package.swift content ==="
            cat Package.swift
          fi
          echo "=== Xcode project packages ==="
          find . -name "*.xcodeproj" -exec echo "Project: {}" \; -exec plutil -p "{}/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" 2>/dev/null \; || echo "No Package.resolved found"

      # Resolve Swift Package dependencies
      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8

      - name: Fallback - Manual SPM resolution
        if: failure()
        run: swift package resolve || echo "Swift package resolve failed"
        timeout-minutes: 5

      # Install SwiftLint
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint lint --quiet --reporter json . > swiftlint.json

      # mobsfscan
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true

      # Install Periphery
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery
        run: |
          periphery scan --config periphery.yml
          if [ -f "periphery-report.json" ]; then
            echo "📊 Periphery Analysis Summary:"
            echo "Total issues found: $(cat periphery-report.json | jq length 2>/dev/null || echo 'Unable to parse')"
          fi

      # Prepare SonarQube reports
      - name: Prepare SonarQube reports
        run: |
          if [ -f swiftlint.json ]; then
            mv swiftlint.json sonarqube-swiftlint.json
          fi
          if [ -f periphery-report.json ]; then
            mv periphery-report.json sonarqube-periphery.json
          fi
          if [ -f mobsfscan-report.json ]; then
            mv mobsfscan-report.json sonarqube-mobsfscan.json
          fi

      # SonarQube Scan
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
