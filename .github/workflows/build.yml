name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: true

      # Configuration Git GLOBALE pour tous les outils
      - name: Configure git authentication globally
        run: |
          # Configure l'auth pour les repos privés (token écrit directement)
          git config --global url."https://${{ secrets.GH_TOKEN }}:@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
          
          # Test d'accès privé
          echo "Testing private repo access..."
          git ls-remote https://github.com/theosementa/AlertKit.git HEAD || echo "Private access test failed"

      # Clear tous les caches possibles
      - name: Clear all caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/com.github.peripheryapp
          rm -rf .build
        continue-on-error: true

      # Diagnostic: Vérifier les packages dans Package.swift
      - name: Debug - Show Package.swift dependencies
        run: |
          if [ -f "Package.swift" ]; then
            echo "=== Package.swift content ==="
            cat Package.swift
          fi
          
          # Chercher les dépendances dans le projet Xcode
          echo "=== Xcode project packages ==="
          find . -name "*.xcodeproj" -exec echo "Project: {}" \; -exec plutil -p "{}/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" 2>/dev/null \; || echo "No Package.resolved found"

      # Résolution avec diagnostics détaillés
      - name: Resolve Swift Package dependencies
        run: |
          echo "Starting dependency resolution..."
          echo "Current directory: $(pwd)"
          echo "Xcode version: $(xcodebuild -version)"
          
          # Résolution avec verbose
          xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8

      # Si la résolution échoue, essayer plan B
      - name: Fallback - Manual SPM resolution
        if: failure()
        run: |
          echo "Trying manual SPM resolution..."
          swift package resolve || echo "Swift package resolve failed"
        timeout-minutes: 5

      # SwiftLint sur tout le projet
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint on entire project
        run: |
          echo "Running SwiftLint on entire project..."
          swiftlint lint --quiet --reporter json .
        continue-on-error: true

      # mobsfscan
      - name: Set up Python venv and install mobsfscan
        run: |
          python3 -m venv mobsfvenv
          source mobsfvenv/bin/activate
          pip install --upgrade pip
          pip install mobsfscan

      - name: Run mobsfscan
        run: |
          source mobsfvenv/bin/activate
          mobsfscan . --json > mobsfscan-report.json
        continue-on-error: true

      # Periphery avec configuration Git héritée
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery with proper Git config
        run: |
          # Vérifier que la config Git est toujours active
          git config --list | grep url.https || echo "No Git URL rewrite found"
          
          # Lancer Periphery
          periphery scan \
            --project CashFlow.xcodeproj \
            --schemes CashFlow \
            --targets CashFlow \
            --format xcode \
            --build-arguments -destination,"platform=iOS Simulator,name=iPhone 14,OS=latest"
        env:
          GIT_TERMINAL_PROMPT: 0

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -X
