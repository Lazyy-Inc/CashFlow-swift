name: Quality Phase

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Analysis
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          fetch-depth: 0
          python-version: '3.12'

      # Configuration Git GLOBALE pour tous les outils
      - name: Configure git authentication globally
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/theosementa/".insteadOf "https://github.com/theosementa/"
          echo "Testing private repo access..."
          git ls-remote https://github.com/theosementa/AlertKit.git HEAD || echo "Private access test failed"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Clear tous les caches possibles
      - name: Clear all caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/com.github.peripheryapp
          rm -rf .build
        continue-on-error: true

      # Résolution des dépendances
      - name: Resolve Swift Package dependencies
        run: |
          echo "Starting dependency resolution..."
          xcodebuild -resolvePackageDependencies -verbose
        timeout-minutes: 8
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # SwiftLint sur tout le projet
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint on entire project
        run: |
          echo "Running SwiftLint on entire project..."
          swiftlint lint --quiet --reporter json > sonarqube-swiftlint.json
        continue-on-error: true

      # Installation de xcpretty pour formater les résultats xcodebuild
      - name: Install xcpretty
        run: gem install xcpretty

      # Exécution des tests avec le Test Plan
      - name: Run All Tests with Test Plan
        run: |
          echo "Running tests with TestPlan.xctestplan..."
          xcodebuild test \
            -project CashFlow.xcodeproj \
            -scheme CashFlow \
            -testPlan TestPlan \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES \
            -derivedDataPath ./DerivedData \
            | xcpretty --report json-compilation-database --output compile_commands.json
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Conversion de la couverture de code au format SonarQube
      - name: Convert coverage to SonarQube format
        run: |
          echo "Converting Xcode coverage to SonarQube format..."
          
          # Recherche du fichier de couverture
          COVERAGE_FILE=$(find DerivedData -name "*.xccovarchive" | head -n 1)
          
          if [ -z "$COVERAGE_FILE" ]; then
            echo "No coverage file found"
            exit 0
          fi
          
          echo "Found coverage file: $COVERAGE_FILE"
          
          # Extraction de la couverture en JSON
          xcrun xccov view --report --json "$COVERAGE_FILE" > coverage.json
          
          # Conversion au format SonarQube generic coverage
          python3 << 'EOF'
          import json
          import xml.etree.ElementTree as ET
          
          with open('coverage.json', 'r') as f:
              data = json.load(f)
          
          root = ET.Element('coverage', version="1")
          
          for target in data.get('targets', []):
              for file_data in target.get('files', []):
                  file_path = file_data.get('path', '')
                  if not file_path or '/Tests/' in file_path:
                      continue
                  
                  file_elem = ET.SubElement(root, 'file', path=file_path)
                  
                  for func in file_data.get('functions', []):
                      for line_data in func.get('executableLines', []):
                          line_num = line_data.get('line', 0)
                          exec_count = line_data.get('executionCount', 0)
                          ET.SubElement(file_elem, 'lineToCover', 
                                      lineNumber=str(line_num),
                                      covered=str(exec_count > 0).lower())
          
          tree = ET.ElementTree(root)
          ET.indent(tree, space="  ")
          tree.write('sonarqube-coverage.xml', encoding='utf-8', xml_declaration=True)
          print("Coverage converted successfully")
          EOF
        continue-on-error: true

      # Mobsfscan en SARIF
      - name: mobsfscan
        run: |
          pip install mobsfscan
          mobsfscan . --sarif > mobsfscan-report.sarif
          echo "Mobsfscan SARIF completed, checking output..."
          if [ -f "mobsfscan-report.sarif" ]; then
            echo "SARIF file created successfully"
            head -20 mobsfscan-report.sarif
          else
            echo "SARIF file not found!"
          fi

      # Debug: Vérifier les fichiers générés
      - name: List generated reports
        run: |
          echo "=== Generated reports ==="
          ls -lh *.json *.xml *.sarif 2>/dev/null || echo "No report files found"
          
          if [ -f "sonarqube-coverage.xml" ]; then
            echo "=== Coverage XML preview ==="
            head -30 sonarqube-coverage.xml
          fi

      # SonarQube
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          args: -X
