# Configuration Periphery pour CashFlow

project: CashFlow.xcodeproj
schemes:
  - CashFlow
targets:
  - CashFlow

# Arguments de build
build_arguments:
  - -destination
  - platform=iOS Simulator,name=iPhone 16,OS=18.4
  - -configuration
  - Debug
  - -allowProvisioningUpdates
  - -allowProvisioningDeviceRegistration

# Output JSON
format: json

# Options pour garder certains éléments malgré qu'ils semblent inutilisés
retain_public: true
retain_objc_accessible: true
retain_objc_annotated: true
retain_unused_protocol_func_params: true
retain_codable_properties: true
disable_update_check: true
verbose: false
quiet: true
strict: false

# Ajout : pour retenir assign-only properties si besoin
# retain_assign_only_property_types:
#   - String
#   - Int
#   - etc.

# Mode moins strict / CI-friendly
strict: false
verbose: false
quiet: true
disable_update_check: true

# Exclusion de répertoires ou patterns (tu peux adapter selon ton projet)
report_exclude:
  - ".*Tests.*"
  - "Pods/.*"
  - "Carthage/.*"
  - "External/.*"
